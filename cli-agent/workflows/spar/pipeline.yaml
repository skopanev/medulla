# Konsilium workflow — a panel of independent models answers the same question in parallel
#
# Run (always --stage prepare: it bypasses engine resume, otherwise an
# interrupted run silently answers the PREVIOUS question from stale vars):
#   medulla --docker -w .medulla/workflows/spar --stage prepare --var "QUESTION=your question"
#
# Or install as a Claude Code skill (then /spar fires when Claude
# decides it needs outside perspective):
#   mkdir -p .claude/skills/spar && cp .medulla/workflows/spar/SKILL.md .claude/skills/spar/
#
# Output: synthesized.md inside <workflow>/runs/<timestamp>-XXXX/
#
# Panel composition lives in the `panel` stage list: one
# "slug|executor|model|effort" line per panelist (model and effort optional),
# dispatched by scripts/panelist.sh (CLI flags mirror medulla/executor.py).
# effort sets reasoning depth: opencode -> OPENCODE_CONFIG_CONTENT reasoningEffort,
# codex -> -c model_reasoning_effort. The panelist prompt is assembled by panelist.sh:
# prompts/spar.md preamble + question.md + the output-file contract.
#
# min_success semantics: panel items run with ignore_rc, the synthesize
# stage fails the round only when NO panelist produced an output file and
# stamps a warning into the artifact on partial delivery.
#
# DOCKERFILE defaults to spar's own Dockerfile (this dir); override with
# --var DOCKERFILE=... to reuse another image.
#
# Vars (ROUND_DIR) live in the shared .medulla/vars.yaml — do not run two
# pipelines concurrently in the same workdir.
version: "0.1"
starting: prepare

round_timeout: 1800

vars:
  DOCKERFILE: Dockerfile

stages:
  prepare:
    runner:
      shell: |
        if [ -z "${QUESTION:-}" ]; then
          echo "<signal:failed>provide a question via --var QUESTION=\"your question\"</signal:failed>"
          exit 1
        fi
        WF=.medulla/workflows/spar
        [ -d "$WF" ] || WF=cli-agent/workflows/spar
        mkdir -p "$WF/runs"
        ROUND_DIR=$(mktemp -d "$PWD/$WF/runs/$(date +%Y%m%d-%H%M%S)-XXXX")
        printf '%s\n' "$QUESTION" > "$ROUND_DIR/question.md"
        echo "<signal:var key=ROUND_DIR>$ROUND_DIR</signal:var>"
        echo "<signal:ready>$ROUND_DIR</signal:ready>"
      timeout: 30
    on_signal:
      ready: panel
      failed: __exit__
      default: __exit__

  panel:
    runner:
      loop:
        parallel: true
        list: |
          printf '%s\n' \
            "glm5|opencode|zai-coding-plan/glm-5.2|max" \
            "gpt5|codex|gpt-5.5|xhigh" \
            "sonnet|claude-code|sonnet" \
            "gemini|agy|Gemini 3.1 Pro (High)"
        runner:
          shell: |
            WF=.medulla/workflows/spar
            [ -d "$WF" ] || WF=cli-agent/workflows/spar
            bash "$WF/scripts/panelist.sh" "{{__item__}}"
          timeout: 1800
          ignore_rc: true
    on_signal:
      done: __next_item__
      loop_done: synthesize
      # parallel-loop failures exiting directly would hit the engine's
      # exit-0 path (runner.py:501→802) — converge on the synthesize guard
      failed: synthesize
      default: __exit__

  synthesize:
    runner:
      shell: |
        total=4
        count=0
        out="$ROUND_DIR/synthesized.md"
        tmp="$ROUND_DIR/.synthesized.tmp"
        : > "$tmp"
        for f in "$ROUND_DIR"/*.md; do
          [ -f "$f" ] || continue
          name=$(basename "$f" .md)
          case "$name" in synthesized|question) continue ;; esac
          { echo "# $name"; echo; cat "$f"; echo; echo "---"; echo; } >> "$tmp"
          count=$((count + 1))
        done
        if [ "$count" -eq 0 ]; then
          rm -f "$tmp"
          echo "<signal:failed>no panelist produced output in $ROUND_DIR</signal:failed>"
          exit 1
        fi
        if [ "$count" -lt "$total" ]; then
          printf '> WARNING: only %s/%s panelists delivered output; see %s/logs/\n' "$count" "$total" "$ROUND_DIR" >> "$tmp"
          echo "<signal:update>only $count/$total panelists delivered</signal:update>"
        fi
        mv "$tmp" "$out"
        echo "synthesized $count takes -> $out"
        echo "<signal:ready>$out</signal:ready>"
      timeout: 30
    on_signal:
      ready: __exit__
      failed: __exit__
      default: __exit__
