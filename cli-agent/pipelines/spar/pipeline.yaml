# spar — a panel of independent models answers the same question in parallel.
#
# Run:
#   medulla -w .medulla/pipelines/spar --var "QUESTION=your question"
#   medulla --docker -w .medulla/pipelines/spar --var "QUESTION=..."
#
# Output: synthesized.md inside $MEDULLA_RUN_DIR/artifacts/.
#
# v2 shape: the panel is a pool over agent-typed inputs — every scalar agent
# field is a template, so one body serves all panelists (no dispatcher script:
# panelist.sh died with v1). post: is the truth channel — a panelist counts
# only if its output file exists, regardless of its CLI's exit code.
# min_success: 1 = the panel is useful if anyone delivered; synthesize stamps
# a warning on partial delivery. Interrupted/timed-out runs resume with
# --resume: delivered panelists are skipped via the manifest done-mask.
version: "2"
start: prepare
timeout: 3600

defaults:
  timeout: 1800

nodes:

  prepare:
    shell: |
      if [ -z "${QUESTION:-}" ]; then
        echo "<signal:failed>provide a question via --var QUESTION=\"...\"</signal:failed>"
        exit 1
      fi
      mkdir -p "$MEDULLA_RUN_DIR/artifacts"
      printf '%s\n' "$QUESTION" > "$MEDULLA_RUN_DIR/artifacts/question.md"
      echo "<signal:var key=ROUND_DIR>$MEDULLA_RUN_DIR/artifacts</signal:var>"
      echo "<signal:ready>ok</signal:ready>"
    timeout: 30
    on_signal:
      ready: panel
      failed: __exit_fail__

  panel:
    inputs:
      - {slug: glm5,   harness: opencode,    model: zai-coding-plan/glm-5.2, effort: max}
      - {slug: gpt5,   harness: codex,       model: gpt-5.5,                 effort: xhigh}
      - {slug: sonnet, harness: claude-code, model: sonnet}
      - {slug: gemini, harness: agy,         model: "Gemini 3.1 Pro (High)"}
    max_parallel: all
    min_success: 1
    agent:
      harness: "{{input.harness}}"
      model: "{{input.model}}"
      effort: "{{input.effort:-}}"
    prompt: |
      {{file:prompts/spar.md}}

      ## Question

      {{var:QUESTION}}

      Use your file-write tool to write your full response to this exact path:

      ```
      {{var:ROUND_DIR}}/{{input.slug}}.md
      ```

      Do not paste the response in chat. After writing the file, print exactly
      one line and stop:

      SUMMARY: <your one-sentence summary>
    post: 'test -s "$ROUND_DIR/$MEDULLA_INPUT_SLUG.md"'
    timeout: 1800
    on_signal:
      __done__: synthesize
      __failed__: __exit_fail__

  synthesize:
    shell: |
      out="$ROUND_DIR/synthesized.md"
      total=$(jq -s length "$MEDULLA_MANIFEST_PANEL")
      ok=$(jq -s 'map(select(.ok)) | length' "$MEDULLA_MANIFEST_PANEL")
      : > "$out"
      for slug in $(jq -s -r 'map(select(.ok) | .input.slug) | .[]' "$MEDULLA_MANIFEST_PANEL"); do
        f="$ROUND_DIR/$slug.md"
        [ -f "$f" ] || continue
        { echo "# $slug"; echo; cat "$f"; echo; echo "---"; echo; } >> "$out"
      done
      if [ "$ok" -lt "$total" ]; then
        printf '> WARNING: only %s/%s panelists delivered output\n' "$ok" "$total" >> "$out"
        echo "<signal:update>only $ok/$total panelists delivered</signal:update>"
      fi
      echo "synthesized $ok takes -> $out"
      echo "<signal:ready>$out</signal:ready>"
    timeout: 30
    on_signal:
      ready: __exit_ok__
